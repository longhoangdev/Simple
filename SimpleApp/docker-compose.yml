services:
  simpleapp:
    image: simpleapp
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - 8081:8080  
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=simple-db;Username=postgres;Password=postgres
  postgres:
    image: postgres:latest
    restart: always
    environment:
      - POSTGRES_DB=simple-db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - 5432:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready", "-d", "simple-db" ]
      interval: 5s
      timeout: 60s
      retries: 5

volumes:
  postgres_data:
